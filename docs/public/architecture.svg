<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow-lg" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="grad-server" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#646cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#535bf2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-sub" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-device" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad-console" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="#fafbfc"/>
  <rect width="900" height="520" rx="16" fill="url(#grid)" opacity="0.5"/>

  <!-- LAN boundary -->
  <rect x="30" y="20" width="840" height="480" rx="12" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="56" y="46" font-size="12" fill="#94a3b8" font-weight="500" letter-spacing="1">HOME LAN</text>

  <!-- Console App (left side) -->
  <g filter="url(#shadow-lg)">
    <rect x="60" y="170" width="150" height="160" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="60" y="170" width="150" height="40" rx="12" fill="url(#grad-console)"/>
    <rect x="60" y="198" width="150" height="12" fill="url(#grad-console)"/>
    <text x="135" y="196" font-size="13" fill="white" font-weight="600" text-anchor="middle">Console App</text>
    <text x="135" y="236" font-size="11" fill="#64748b" text-anchor="middle">Natural Language</text>
    <text x="135" y="254" font-size="11" fill="#64748b" text-anchor="middle">Interface</text>
    <text x="135" y="280" font-size="18" text-anchor="middle">💬</text>
    <text x="135" y="310" font-size="10" fill="#94a3b8" text-anchor="middle">Voice / Text / Image</text>
  </g>

  <!-- Arrow: Console -> Server -->
  <line x1="210" y1="250" x2="290" y2="250" stroke="#646cff" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <defs>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#646cff"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#059669"/>
    </marker>
  </defs>
  <text x="250" y="240" font-size="10" fill="#646cff" text-anchor="middle" font-weight="500">TLS</text>

  <!-- OHAI Server (center) -->
  <g filter="url(#shadow-lg)">
    <rect x="300" y="70" width="310" height="380" rx="14" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect x="300" y="70" width="310" height="44" rx="14" fill="url(#grad-server)"/>
    <rect x="300" y="100" width="310" height="14" fill="url(#grad-server)"/>
    <text x="455" y="100" font-size="15" fill="white" font-weight="700" text-anchor="middle">OHAI Server</text>
    <text x="455" y="136" font-size="11" fill="#94a3b8" text-anchor="middle">MQTT Broker + AI Engine + Certificate Authority</text>

    <!-- Main Agent -->
    <g filter="url(#shadow)">
      <rect x="330" y="156" width="250" height="56" rx="10" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
      <circle cx="356" cy="184" r="14" fill="url(#grad-main)"/>
      <text x="356" y="188" font-size="12" fill="white" text-anchor="middle">🧠</text>
      <text x="396" y="180" font-size="12" fill="#1e293b" font-weight="600">Main Agent</text>
      <text x="396" y="198" font-size="10" fill="#64748b">Orchestration &amp; User Interaction</text>
    </g>

    <!-- Isolation boundary -->
    <line x1="320" y1="228" x2="590" y2="228" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="455" y="248" font-size="10" fill="#94a3b8" text-anchor="middle" font-style="italic">Isolated Context Boundary</text>

    <!-- Sub Agent A -->
    <g filter="url(#shadow)">
      <rect x="330" y="262" width="115" height="56" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="355" cy="283" r="10" fill="url(#grad-sub)"/>
      <text x="355" y="287" font-size="9" fill="white" text-anchor="middle">A</text>
      <text x="398" y="280" font-size="11" fill="#1e293b" font-weight="600" text-anchor="middle">Sub Agent</text>
      <text x="398" y="296" font-size="9" fill="#64748b" text-anchor="middle">Device A</text>
    </g>

    <!-- Sub Agent B -->
    <g filter="url(#shadow)">
      <rect x="465" y="262" width="115" height="56" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="490" cy="283" r="10" fill="url(#grad-sub)"/>
      <text x="490" y="287" font-size="9" fill="white" text-anchor="middle">B</text>
      <text x="533" y="280" font-size="11" fill="#1e293b" font-weight="600" text-anchor="middle">Sub Agent</text>
      <text x="533" y="296" font-size="9" fill="#64748b" text-anchor="middle">Device B</text>
    </g>

    <!-- Sub Agent C -->
    <g filter="url(#shadow)">
      <rect x="330" y="334" width="115" height="56" rx="8" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
      <circle cx="355" cy="355" r="10" fill="url(#grad-sub)"/>
      <text x="355" y="359" font-size="9" fill="white" text-anchor="middle">C</text>
      <text x="398" y="352" font-size="11" fill="#1e293b" font-weight="600" text-anchor="middle">Sub Agent</text>
      <text x="398" y="368" font-size="9" fill="#64748b" text-anchor="middle">Device C</text>
    </g>

    <!-- Ellipsis -->
    <text x="523" y="368" font-size="20" fill="#cbd5e1" text-anchor="middle">...</text>

    <!-- Lock icon for isolation -->
    <text x="574" y="416" font-size="10" fill="#94a3b8" text-anchor="end">🔒 Context Isolation</text>
  </g>

  <!-- Devices (right side) -->
  <!-- Device A -->
  <g filter="url(#shadow)">
    <rect x="680" y="120" width="150" height="70" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="708" cy="155" r="14" fill="url(#grad-device)"/>
    <text x="708" y="159" font-size="12" fill="white" text-anchor="middle">💡</text>
    <text x="745" y="148" font-size="12" fill="#1e293b" font-weight="600">Device A</text>
    <text x="745" y="166" font-size="10" fill="#64748b">Smart Light</text>
  </g>

  <!-- Device B -->
  <g filter="url(#shadow)">
    <rect x="680" y="210" width="150" height="70" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="708" cy="245" r="14" fill="url(#grad-device)"/>
    <text x="708" y="249" font-size="12" fill="white" text-anchor="middle">🌡</text>
    <text x="745" y="238" font-size="12" fill="#1e293b" font-weight="600">Device B</text>
    <text x="745" y="256" font-size="10" fill="#64748b">Thermostat</text>
  </g>

  <!-- Device C -->
  <g filter="url(#shadow)">
    <rect x="680" y="300" width="150" height="70" rx="10" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="708" cy="335" r="14" fill="url(#grad-device)"/>
    <text x="708" y="339" font-size="12" fill="white" text-anchor="middle">🔊</text>
    <text x="745" y="328" font-size="12" fill="#1e293b" font-weight="600">Device C</text>
    <text x="745" y="346" font-size="10" fill="#64748b">Speaker</text>
  </g>

  <!-- Arrows: Sub Agents -> Devices (each to its own) -->

  <!-- Sub Agent A -> Device A -->
  <path d="M 445 290 Q 620 290 620 155 L 680 155" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Sub Agent B -> Device B -->
  <line x1="580" y1="290" x2="680" y2="245" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Sub Agent C -> Device C -->
  <path d="M 445 362 Q 620 362 620 335 L 680 335" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- mTLS labels -->
  <text x="648" y="130" font-size="9" fill="#059669" font-weight="500">mTLS</text>
  <text x="648" y="240" font-size="9" fill="#059669" font-weight="500">mTLS</text>
  <text x="648" y="355" font-size="9" fill="#059669" font-weight="500">mTLS</text>

  <!-- Bottom annotation -->
  <text x="455" y="480" font-size="11" fill="#94a3b8" text-anchor="middle">Each device runs in a fully isolated Sub Agent — zero shared context, zero cross-device leakage</text>
</svg>
